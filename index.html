<!DOCTYPE html>
<meta name="mobile-web-app-capable" content="yes">
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
  <meta name="color-scheme" content="light dark" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta property="og:title" content="Callit — The Prediction Market" />
  <meta property="og:description" content="Make your call. Stake your opinion. Win coins." />
  <meta property="og:url" content="https://callitmarket.com" />
  <meta property="og:image" content="https://callitmarket.com/og-image.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:site" content="@callitapp_" />
  <title>Callit — The Prediction Market</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
  <!-- Apply theme BEFORE React mounts — prevents flash and in-app browser color corruption -->
  <script>
    (function () {
      try {
        var theme = localStorage.getItem('callit-theme') || 'dark';
        document.documentElement.classList.toggle('dark', theme === 'dark');
        document.documentElement.style.colorScheme = theme === 'dark' ? 'dark' : 'light';
      } catch (e) { }
    })();
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
